<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <clipPath id="clip">
      <rect width="32" height="32" rx="6"/>
    </clipPath>
  </defs>

  <rect width="32" height="32" rx="6" fill="#DBEAFE"/>

  <g clip-path="url(#clip)">
    <!-- Band 1: lightest blue (widest) -->
    <polygon
      points="0,14 4,11 8,9 12,8 16,7 20,6 24,6 28,5 32,5 32,32 0,32"
      fill="#93C5FD" fill-opacity="0.5"
    />

    <!-- Band 2: mid blue -->
    <polygon
      points="0,20 4,17 8,15 12,14 16,12 20,11 24,10 28,10 32,10 32,32 0,32"
      fill="#3B82F6" fill-opacity="0.45"
    />

    <!-- Band 3: deep blue (narrowest) -->
    <polygon
      points="0,26 4,24 8,22 12,20 16,19 20,18 24,17 28,17 32,17 32,32 0,32"
      fill="#1D4ED8" fill-opacity="0.55"
    />

    <!-- Current year line (near-black, bold) -->
    <polyline
      points="0,23 4,22 8,20 12,18 16,17 18,15 20,16 24,13 26,15 28,12 32,13"
      stroke="#0F172A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"
    />
  </g>
</svg>
